server:
  port: 8132

spring:
  application:
    name: gis-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/vcall_gis
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.spatial.dialect.postgis.PostgreSQLPG10Dialect
  flyway:
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
