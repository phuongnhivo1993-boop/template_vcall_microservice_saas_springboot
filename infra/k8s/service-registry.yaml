apiVersion: v1
kind: ConfigMap
metadata:
  name: service-registry-config
  namespace: vcall
data:
  application.yml: |
    server:
      port: 8761
    eureka:
      instance:
        hostname: service-registry
      client:
        registerWithEureka: false
        fetchRegistry: false
        serviceUrl:
          defaultZone: http://service-registry:8761/eureka/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
  namespace: vcall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      containers:
      - name: service-registry
        image: vcall/service-registry:latest
        ports:
        - containerPort: 8761
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_CONFIG_IMPORT
          value: configmap:service-registry-config
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8761
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-registry
  namespace: vcall
spec:
  selector:
    app: service-registry
  ports:
  - port: 8761
    targetPort: 8761
