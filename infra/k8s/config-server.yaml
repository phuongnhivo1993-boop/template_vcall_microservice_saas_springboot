apiVersion: v1
kind: ConfigMap
metadata:
  name: config-server-config
  namespace: vcall
data:
  application.yml: |
    server:
      port: 8888
    spring:
      cloud:
        config:
          server:
            git:
              uri: https://github.com/vcall/config-repo
              default-label: main
              search-paths: '{application}'
    eureka:
      client:
        serviceUrl:
          defaultZone: http://service-registry:8761/eureka/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: vcall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server
        image: vcall/config-server:latest
        ports:
        - containerPort: 8888
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_CONFIG_IMPORT
          value: configmap:config-server-config
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8888
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: vcall
spec:
  selector:
    app: config-server
  ports:
  - port: 8888
    targetPort: 8888
