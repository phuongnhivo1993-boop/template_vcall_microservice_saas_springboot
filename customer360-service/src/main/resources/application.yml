server:
  port: 8120

spring:
  application:
    name: customer360-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/vcall_customer360
    username: vcall
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
