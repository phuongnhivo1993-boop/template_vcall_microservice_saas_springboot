server:
  port: 8080
  address: 0.0.0.0

spring:
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: http://iam-service:8101
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
        - id: roles-service
          uri: http://iam-service:8101
          predicates:
            - Path=/api/v1/roles/**, /api/v1/settings/**
    config:
      enabled: false

eureka:
  client:
    enabled: false
