        - id: ai-service
          uri: http://localhost:8208
          predicates:
            - Path=/api/v1/ai/**
        - id: analytics-service
          uri: http://localhost:8209
          predicates:
            - Path=/api/v1/analytics/**
        - id: digital-twin-service
          uri: http://localhost:8210
          predicates:
            - Path=/api/v1/digital-twins/**
        - id: bim-cad-service
          uri: http://localhost:8211
          predicates:
            - Path=/api/v1/bim-cad/**
        - id: gis-service
          uri: http://localhost:8212
          predicates:
            - Path=/api/v1/gis/**
        - id: customer360-service
          uri: http://localhost:8213
          predicates:
            - Path=/api/v1/customer360/**

