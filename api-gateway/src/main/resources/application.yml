server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      enabled: false
    gateway:
      routes:
        - id: customer360-service
          uri: lb://customer360-service
          predicates:
            - Path=/api/v1/customer360/**
        - id: customer-tags
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customer-tags/**
        - id: agent-groups
          uri: lb://agent-service
          predicates:
            - Path=/api/v1/agent-groups/**
        - id: notification-preferences
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notification-preferences/**
        - id: notification-templates
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notification-templates/**
        - id: push-devices
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/push/devices/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
        - id: agent-service
          uri: lb://agent-service
          predicates:
            - Path=/api/v1/agents/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers/**
        - id: crm-service
          uri: lb://crm-service
          predicates:
            - Path=/api/v1/crm/**
        - id: call-service
          uri: lb://call-service
          predicates:
            - Path=/api/v1/calls/**
        - id: sip-service
          uri: lb://sip-service
          predicates:
            - Path=/api/v1/sip/**
        - id: pbx-service
          uri: lb://pbx-service
          predicates:
            - Path=/api/v1/pbx/**
        - id: recording-service
          uri: lb://recording-service
          predicates:
            - Path=/api/v1/recordings/**
        - id: omnichannel-service
          uri: lb://omnichannel-service
          predicates:
            - Path=/api/v1/omnichannel/**
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/v1/chat/**
        - id: call-queues
          uri: lb://call-service
          predicates:
            - Path=/api/v1/call-queues/**
        - id: ivr-flows
          uri: lb://call-service
          predicates:
            - Path=/api/v1/ivr-flows/**
        - id: routing-rules
          uri: lb://call-service
          predicates:
            - Path=/api/v1/routing-rules/**
        - id: email-service
          uri: lb://email-service
          predicates:
            - Path=/api/v1/email/**
        - id: sms-service
          uri: lb://sms-service
          predicates:
            - Path=/api/v1/sms/**
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/v1/tickets/**
        - id: campaign-service
          uri: lb://campaign-service
          predicates:
            - Path=/api/v1/campaigns/**
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/billing/**
        - id: cdr-service
          uri: lb://cdr-service
          predicates:
            - Path=/api/v1/cdr/**
        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/v1/reports/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
        - id: settings-service
          uri: lb://iam-service
          predicates:
            - Path=/api/v1/settings/**
        - id: dashboard-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/v1/dashboard/**
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/v1/audit/**
        - id: scheduling-service
          uri: lb://scheduling-service
          predicates:
            - Path=/api/v1/scheduling/**
        - id: survey-service
          uri: lb://survey-service
          predicates:
            - Path=/api/v1/surveys/**
        - id: agent-sessions
          uri: lb://agent-service
          predicates:
            - Path=/api/v1/agent-sessions/**
        - id: mfa-service
          uri: lb://iam-service
          predicates:
            - Path=/api/v1/mfa/**
        - id: gdpr-service
          uri: lb://iam-service
          predicates:
            - Path=/api/v1/gdpr/**
        - id: permissions-service
          uri: lb://iam-service
          predicates:
            - Path=/api/v1/permissions/**
        - id: roles-service
          uri: lb://iam-service
          predicates:
            - Path=/api/v1/roles/**
        - id: sla-rules
          uri: lb://ticket-service
          predicates:
            - Path=/api/v1/sla-rules/**, /api/v1/sla/**
        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/api/v1/automation/**
        - id: webhooks-service
          uri: lb://webhooks-service
          predicates:
            - Path=/api/v1/webhooks/**
        - id: knowledge-base-service
          uri: lb://knowledge-base-service
          predicates:
            - Path=/api/v1/knowledge-base/**
        # ========== XR Platform Routes ==========
        - id: tenant-service
          uri: lb://tenant-service
          predicates:
            - Path=/api/v1/tenants/**
        - id: asset-service
          uri: lb://asset-service
          predicates:
            - Path=/api/v1/assets/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
        - id: scene-service
          uri: lb://scene-service
          predicates:
            - Path=/api/v1/scenes/**
        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/api/v1/videos/**
        - id: streaming-service
          uri: lb://streaming-service
          predicates:
            - Path=/api/v1/streaming/**
        - id: xr-service
          uri: lb://xr-service
          predicates:
            - Path=/api/v1/xr/**
        - id: xr-sessions
          uri: lb://xr-service
          predicates:
            - Path=/api/v1/xr-sessions/**
        - id: xr-collaboration
          uri: lb://collaboration-service
          predicates:
            - Path=/api/v1/xr/collaboration/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/ai/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
        - id: collaboration-service
          uri: lb://collaboration-service
          predicates:
            - Path=/api/v1/collaboration/**
        - id: digital-twin-service
          uri: lb://digital-twin-service
          predicates:
            - Path=/api/v1/digital-twins/**
        - id: bim-cad-service
          uri: lb://bim-cad-service
          predicates:
            - Path=/api/v1/bim-cad/**
        - id: gis-service
          uri: lb://gis-service
          predicates:
            - Path=/api/v1/gis/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

rate-limiter:
  enabled: true
  default-capacity: 100
  default-refill-tokens: 10
  default-refill-duration: 1
  routes:
    iam-service:
      capacity: 50
      refill-tokens: 5
      refill-duration: 1
    auth:
      capacity: 20
      refill-tokens: 3
      refill-duration: 1
    call-service:
      capacity: 200
      refill-tokens: 20
      refill-duration: 1
    ticket-service:
      capacity: 150
      refill-tokens: 15
      refill-duration: 1
    notification-service:
      capacity: 30
      refill-tokens: 5
      refill-duration: 1
    asset-service:
      capacity: 100
      refill-tokens: 10
      refill-duration: 1
    video-service:
      capacity: 50
      refill-tokens: 5
      refill-duration: 1
    streaming-service:
      capacity: 50
      refill-tokens: 5
      refill-duration: 1
    xr-service:
      capacity: 100
      refill-tokens: 10
      refill-duration: 1
    ai-service:
      capacity: 30
      refill-tokens: 3
      refill-duration: 1

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
