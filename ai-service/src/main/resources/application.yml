server:
  port: 8126

spring:
  application:
    name: ai-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4}
  tts:
    engine: ${TTS_ENGINE:openai}
    voice: ${TTS_VOICE:alloy}
  translation:
    provider: ${TRANSLATION_PROVIDER:openai}
    default-target-language: en

logging:
  level:
    com.vcall.xr.ai: DEBUG
